<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Demographic Advertising</title>
    <!-- Tailwind CSS for modern, premium styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6">
    
    <!-- Navbar -->
    <header class="flex justify-between items-center mb-8 glass-panel rounded-2xl p-4 px-8">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            SmartAd Targeting
        </h1>
        <a href="/admin" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors">
            Ad Manager Dashboard &rarr;
        </a>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left Column: Camera Feed & Stats -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            
            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden">
                <div class="relative rounded-2xl overflow-hidden bg-black aspect-video outline outline-1 outline-slate-700">
                    <div class="absolute top-4 left-4 flex items-center gap-2 z-10">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                        <span class="text-xs font-semibold text-white uppercase tracking-wider bg-black/50 px-2 py-1 rounded-md">Live Analysis</span>
                    </div>
                    <!-- Video element for webcam output (hidden but active) -->
                    <video id="webcam" autoplay playsinline muted class="absolute inset-0 opacity-0 pointer-events-none"></video>
                    <!-- Display element for annotated frames from server -->
                    <img id="annotatedFeed" src="" alt="Waiting for webcam..." class="w-full h-full object-cover relative z-0">
                </div>
                
                <!-- Hidden canvas to capture frames -->
                <canvas id="hiddenCanvas" class="hidden"></canvas>
            </div>

            <!-- Demographics Readout -->
            <div class="glass-panel p-6 rounded-3xl">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Detected Audience</h3>
                
                <div id="statusIndicator" class="text-emerald-400 text-sm mb-4 font-medium flex items-center gap-2">
                    <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Scanning environment...
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                        <div class="text-slate-400 text-xs uppercase tracking-wider mb-1">Detected Age</div>
                        <div id="detectedAge" class="text-2xl font-bold text-white">--</div>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                        <div class="text-slate-400 text-xs uppercase tracking-wider mb-1">Detected Gender</div>
                        <div id="detectedGender" class="text-2xl font-bold text-white">--</div>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- Right Column: The Dynamic Ad -->
        <div class="lg:col-span-7 h-full">
            <div id="adContainer" class="glass-panel rounded-3xl h-full min-h-[500px] flex flex-col items-center justify-center p-8 relative overflow-hidden group">
                
                <div class="absolute inset-0 bg-gradient-to-tr from-blue-500/10 to-emerald-500/10 opacity-50"></div>
                
                <div id="noAdState" class="text-center z-10 transition-opacity duration-500">
                    <svg class="w-16 h-16 mx-auto text-slate-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <h2 class="text-xl font-medium text-white mb-2">Waiting for Audience</h2>
                    <p class="text-slate-400 text-sm max-w-sm">Look into the camera to trigger a personalized advertisement based on your physical demographics.</p>
                </div>

                <img id="dynamicAd" src="" alt="Targeted Advertisement" class="absolute inset-0 w-full h-full object-contain opacity-0 transition-opacity duration-700 ease-in-out z-20">
            </div>
        </div>
        
    </main>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const dynamicAd = document.getElementById('dynamicAd');
        const noAdState = document.getElementById('noAdState');
        const detectedAge = document.getElementById('detectedAge');
        const detectedGender = document.getElementById('detectedGender');
        const statusIndicator = document.getElementById('statusIndicator');

        let lastAdUrl = null;

        // Initialize webcam
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = stream;
                
                // Start processing frames once video is playing
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startDetectionLoop();
                };
            } catch (err) {
                console.error("Error accessing webcam:", err);
                statusIndicator.innerHTML = `<span class="text-red-400">Camera access denied or unavailable.</span>`;
            }
        }

        async function processFrame() {
            if (video.readyState < 2) {
                setTimeout(processFrame, 500); // Try again in 500ms
                return; 
            }

            // Draw current video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            // Convert to base64 JPEG (lower quality for speed)
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();
                
                if (data.error) {
                    statusIndicator.innerHTML = `<span class="text-red-400 text-xs flex items-center gap-2">Backend Error: ${data.error}</span>`;
                    setTimeout(processFrame, 2000); // Retry later
                    return;
                }
                
                // Update the visible video feed to the annotated frame
                if (data.annotated_image) {
                    document.getElementById('annotatedFeed').src = data.annotated_image;
                }
                
                if (data.detected) {
                    statusIndicator.innerHTML = `<span class="text-emerald-400 flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-emerald-400"></div> Audience detected. Personalizing ad...</span>`;
                    // Show age category and specific range
                    detectedAge.textContent = `${data.age_category} (${data.raw_age})`;
                    detectedGender.textContent = data.gender;

                    // Update AD if it's new
                    if (data.ad_url && data.ad_url !== lastAdUrl) {
                        dynamicAd.src = data.ad_url;
                        dynamicAd.onload = () => {
                            dynamicAd.classList.remove('opacity-0');
                            noAdState.classList.add('opacity-0');
                        };
                        lastAdUrl = data.ad_url;
                    } else if (!data.ad_url) {
                        // We detected a person, but have no ads in the backend at all
                        dynamicAd.classList.add('opacity-0');
                        noAdState.classList.remove('opacity-0');
                        noAdState.innerHTML = `<h2 class="text-xl text-yellow-400">No Ads Available</h2><p class="text-slate-400">Please upload ads in the admin panel.</p>`;
                    }
                } else {
                    statusIndicator.innerHTML = `<span class="text-slate-400 flex items-center gap-2"><svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Scanning environment...</span>`;
                    detectedAge.textContent = '--';
                    detectedGender.textContent = '--';
                    
                    // Fade out ad if no one is there
                    dynamicAd.classList.add('opacity-0');
                    noAdState.classList.remove('opacity-0');
                    noAdState.innerHTML = `<svg class="w-16 h-16 mx-auto text-slate-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg><h2 class="text-xl font-medium text-white mb-2">Waiting for Audience</h2><p class="text-slate-400 text-sm max-w-sm">Look into the camera to trigger a personalized advertisement.</p>`;
                    lastAdUrl = null;
                }
            } catch (err) {
                console.error("Prediction error:", err);
                statusIndicator.innerHTML = `<span class="text-red-400 text-xs flex items-center gap-2">Network Error: Could not reach server. Retrying...</span>`;
            }
            
            // Queue next frame instantly processing to reduce lag
            setTimeout(processFrame, 50);
        }

        function startDetectionLoop() {
            // Process a frame every 1000ms (1 second) to save bandwidth and compute
            // Using recursive setTimeout to avoid overlapping requests
            processFrame();
        }

        // Start
        setupCamera();
    </script>
</body>
</html>
